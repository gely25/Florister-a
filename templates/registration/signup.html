{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro · Estudio Floral</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'css/signup.css' %}?v={% now 'U' %}">
<script>
    window.SISART_CONFIG = {
        checkUsernameUrl: "{% url 'accounts:check_username' %}",
        checkEmailUrl: "{% url 'accounts:check_email' %}"
    };
</script>
</head>
<body>

<div class="shell" id="shell">
  <a href="/" class="close-btn" title="Cerrar"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></a>
  
  <div class="header-section">
    <div class="flower-wrap">
      <div class="flower-stage" id="flowerStage"></div>
      <div class="bloom-glow" id="bloomGlow"></div>
    </div>
    <div class="stage-label" id="stageLabel">——</div>
    <h2 class="card-title">Únete al <em>Jardín</em></h2>
    <p class="card-sub">Crea tu cuenta personal</p>
  </div>

  <form method="post" id="signupForm">
    {% csrf_token %}
    <div class="fields-grid">
      <div class="fg">
        <label>
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Nombre
        </label>
        <div class="iw">
          <input type="text" name="first_name" id="nameInput" placeholder="Ana" required>
          <svg class="cs" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          <svg class="fi" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="fm" id="msgName"></div>
      </div>

      <div class="fg">
        <label>
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Apellido
        </label>
        <div class="iw">
          <input type="text" name="last_name" id="lastNameInput" placeholder="García" required>
          <svg class="cs" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          <svg class="fi" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="fm" id="msgLastName"></div>
      </div>

      <div class="fg">
        <label>
          <svg viewBox="0 0 24 24"><path d="M4 17l4-4-4-4M11 19h9"/></svg>
          Usuario
        </label>
        <div class="iw">
          <input type="text" name="username" id="userInput" placeholder="anafloral" required>
          <svg class="cs" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          <svg class="fi" viewBox="0 0 24 24"><path d="M4 17l4-4-4-4M11 19h9"/></svg>
        </div>
        <div class="fm" id="msgUser"></div>
      </div>

      <div class="fg">
        <label>
          <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 8l10 7 10-7"/></svg>
          Correo
        </label>
        <div class="iw">
          <input type="email" name="email" id="emailInput" placeholder="tu@correo.com" required>
          <svg class="cs" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          <svg class="fi" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 8l10 7 10-7"/></svg>
        </div>
        <div class="fm" id="msgEmail"></div>
      </div>

      <div class="fg">
        <label>
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
          Contraseña
        </label>
        <div class="iw">
          <input type="password" name="password1" id="passInput" placeholder="••••••••" required>
          <svg class="cs" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          <button type="button" class="tp togglePassBtn" tabindex="-1">
            <svg class="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a85555" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="fm" id="msgPass"></div>
      </div>

      <div class="fg">
        <label>
          <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
          Confirmar
        </label>
        <div class="iw">
          <input type="password" name="password2" id="passConfirmInput" placeholder="••••••••" required>
          <svg class="cs" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          <button type="button" class="tp togglePassBtn" tabindex="-1">
            <svg class="eyeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a85555" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="fm" id="msgConfirm"></div>
      </div>
    </div>

    <div id="errMsg" class="fm show" style="margin: -5px 0 10px; text-align:center;">
      {% if form.errors %}
        Error en el registro. Por favor, revisa tus datos.
      {% endif %}
    </div>

    <button type="submit" class="btn-register" id="registerBtn">Crear cuenta</button>
    <p class="reg">¿Ya tienes cuenta?<a href="{% url 'accounts:login' %}">Inicia sesión</a></p>
  </form>
</div>

<script src="{% static 'accounts/js/flower-frames.js' %}"></script>
<script src="{% static 'js/signup.js' %}?v={% now 'U' %}"></script>
</body>
</html>
