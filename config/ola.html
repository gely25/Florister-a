<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro · Estudio Floral</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --white:     #ffffff;
    --card:      #fbe8e8;
    --rose:      #c97b7b;
    --rose-deep: #a85555;
    --ink:       #2a1515;
    --muted:     #b09090;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Jost', sans-serif;
    background: #1a0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .shell {
    position: relative;
    width: min(960px, 96vw);
    height: min(600px, 96vh);
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 40px 120px rgba(0,0,0,0.55),
      0 0 0 1px rgba(180,100,100,0.12);
  }

  .half {
    position: absolute;
    top: 0;
    width: 50%;
    height: 100%;
    overflow: hidden;
    transition: none;
  }
  .half-left  { left: 0; }
  .half-right { right: 0; }

  .shell.pre-split .half-left  { transform: translateX(100%); }
  .shell.pre-split .half-right { transform: translateX(-100%); }

  .shell.splitting .half-left {
    transform: translateX(0);
    transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .shell.splitting .half-right {
    transform: translateX(0);
    transition: transform 0.85s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .bg-layer {
    position: absolute;
    width: 200%;
    height: 100%;
    top: 0;
  }
  .half-left  .bg-layer { left: 0; }
  .half-right .bg-layer { left: -100%; }
  .bg-layer svg { width: 100%; height: 100%; }

  .content-layer {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    pointer-events: none;
  }
  .content-layer > * { pointer-events: auto; }

  .left-content {
    width: 52%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-right: 40px;
  }

  .right-content {
    width: 48%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 6% 0 8%;
    position: relative;
  }

  /* ══ CARD ══ */
  .card {
    background: var(--card);
    border-radius: 18px;
    width: 300px;
    padding: 28px 28px 24px;
    border: 1px solid rgba(210,150,150,0.2);
    box-shadow: 0 8px 40px rgba(160,80,80,0.14), 0 1px 4px rgba(160,80,80,0.07);
    opacity: 0;
    animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) forwards 0.75s;
  }

  .brand-dots {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-bottom: 12px;
  }
  .brand-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--rose); display: block;
  }
  .brand-dots span:nth-child(2) { width: 3px; height: 3px; opacity: 0.5; }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 400;
    letter-spacing: 0.1em; text-align: center;
    color: var(--ink); margin-bottom: 4px;
  }
  .card-title em { font-style: italic; color: var(--rose-deep); }

  .card-sub {
    text-align: center; font-size: 0.58rem; font-weight: 300;
    letter-spacing: 0.22em; color: var(--muted); margin-bottom: 18px;
  }

  .orn {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
  }
  .orn-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,123,123,0.3));
  }
  .orn-line.r { background: linear-gradient(90deg, rgba(201,123,123,0.3), transparent); }
  .orn-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--rose); box-shadow: 0 0 5px rgba(201,123,123,0.5);
  }

  /* Campos en dos columnas */
  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 10px;
  }
  .fg { margin-bottom: 11px; }
  .fg.full { grid-column: 1 / -1; }

  .fg label {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.55rem; font-weight: 500;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(168,85,85,0.72); margin-bottom: 5px;
  }
  .fg label svg {
    width: 11px; height: 11px; stroke: var(--rose-deep);
    stroke-width: 1.6; fill: none; flex-shrink: 0; opacity: 0.65;
  }
  .iw { position: relative; }
  .fg input {
    width: 100%; background: #fff;
    border: 1px solid rgba(201,123,123,0.2); border-radius: 7px;
    padding: 8px 32px 8px 10px;
    font-family: 'Jost', sans-serif; font-size: 0.78rem; font-weight: 300;
    color: var(--ink); outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
  }
  .fg input:focus {
    border-color: rgba(201,123,123,0.48);
    box-shadow: 0 0 0 3px rgba(201,123,123,0.09);
  }
  .fg input::placeholder { color: rgba(160,100,100,0.25); }
  .fi {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 13px; height: 13px; stroke: rgba(180,120,120,0.38);
    fill: none; stroke-width: 1.5; pointer-events: none;
  }
  .tp {
    position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 2px;
    opacity: 0.35; transition: opacity 0.2s; display: flex; align-items: center;
  }
  .tp:hover { opacity: 0.7; }
  .tp svg { width: 13px; height: 13px; }

  .err {
    font-size: 0.54rem; letter-spacing: 0.07em; color: #b84040;
    margin-top: 3px; min-height: 11px; opacity: 0; transition: opacity 0.3s;
    grid-column: 1 / -1;
  }
  .err.show { opacity: 1; }

  /* Progress dots */
  .progress {
    display: flex; justify-content: center; gap: 6px; margin-bottom: 14px;
  }
  .pdot {
    width: 5px; height: 5px; border-radius: 50%;
    background: rgba(201,123,123,0.2);
    transition: background 0.4s, transform 0.4s;
  }
  .pdot.filled {
    background: var(--rose);
    transform: scale(1.2);
  }

  .btn-register {
    width: 100%; padding: 11px; background: var(--rose);
    border: none; border-radius: 7px; cursor: pointer;
    font-family: 'Jost', sans-serif; font-size: 0.58rem; font-weight: 500;
    letter-spacing: 0.36em; text-transform: uppercase; color: white;
    position: relative; overflow: hidden;
    transition: background 0.25s, transform 0.12s;
    margin-bottom: 14px; margin-top: 4px;
  }
  .btn-register::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.13),transparent);
    opacity:0; transition:opacity 0.3s;
  }
  .btn-register:hover { background: var(--rose-deep); }
  .btn-register:hover::after { opacity:1; }
  .btn-register:active { transform:scale(0.985); }
  .btn-register.loading { letter-spacing:0.5em; opacity:0.8; pointer-events:none; }

  .reg { text-align:center; font-size:0.56rem; font-weight:300;
    letter-spacing:0.1em; color:var(--muted); }
  .reg a { color:var(--rose-deep); font-weight:400; text-decoration:none;
    border-bottom:1px solid rgba(168,85,85,0.28); transition:border-color 0.2s; }
  .reg a:hover { border-color:var(--rose-deep); }

  /* ══ RIGHT CONTENT ══ */
  .r-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.3rem, 2vw, 2rem); font-weight: 300;
    color: rgba(253,232,232,0.9); line-height: 1.3; margin-bottom: 10px;
    opacity: 0; animation: fadeUp 0.8s ease forwards 1.0s;
    text-align: center;
  }
  .r-title em { font-style:italic; color:rgba(240,195,195,0.7); display:block; }
  .r-sub {
    font-size:0.6rem; font-weight:200; letter-spacing:0.18em;
    line-height:2; color:rgba(253,232,232,0.3);
    opacity:0; animation:fadeUp 0.8s ease forwards 1.15s;
    text-align: center;
  }

  /* Stage label */
  .stage-label {
    font-size: 0.52rem; font-weight: 300; letter-spacing: 0.2em;
    color: rgba(240,195,195,0.4); margin-bottom: 6px; text-align: center;
    min-height: 14px;
    opacity: 0; animation: fadeUp 0.8s ease forwards 1.2s;
    transition: color 0.4s;
  }
  .stage-label.active { color: rgba(240,195,195,0.65); }

  .cr { position:absolute; z-index:2; width:22px; height:22px; }
  .cr-tr { top:18px; right:18px;
    border-top:1px solid rgba(210,155,155,0.16);
    border-right:1px solid rgba(210,155,155,0.16); }
  .cr-br { bottom:18px; right:18px;
    border-bottom:1px solid rgba(210,155,155,0.16);
    border-right:1px solid rgba(210,155,155,0.16); }

  .seam {
    position: absolute; left: 50%; top: 0; bottom: 0;
    width: 2px; transform: translateX(-50%);
    background: linear-gradient(180deg,
      transparent 0%, rgba(200,130,130,0.35) 20%,
      rgba(200,130,130,0.35) 80%, transparent 100%);
    z-index: 20; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease 0.5s;
  }
  .shell.splitting .seam {
    opacity: 1;
    animation: seamFade 1.8s ease forwards 0.5s;
  }

  @keyframes seamFade {
    0%   { opacity: 1; }
    60%  { opacity: 0.5; }
    100% { opacity: 0; }
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(16px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity:0; } to { opacity:1; }
  }

  /* ══ FLOWER ══ */
  .flower-wrap {
    position: relative;
    width: min(200px, 48%);
    aspect-ratio: 1;
    margin: 0 auto 14px;
    opacity: 0;
    animation: fadeIn 1s ease forwards 0.95s;
  }
  .bloom-glow {
    position: absolute; inset: -20%;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(245,198,198,0) 0%, transparent 65%);
    transition: background 1.2s ease;
    pointer-events: none; z-index: 0;
  }
  .flower-stage {
    width: 100%; height: 100%;
    position: relative;
    filter: drop-shadow(0 0 18px rgba(210,155,155,0.15));
    z-index: 1;
  }
  .flower-frame {
    position: absolute; inset: 0;
    opacity: 0; transition: opacity 85ms ease-in-out;
  }
  .flower-frame.active { opacity: 1; }
  .flower-frame svg { width: 100%; height: 100%; }
</style>
</head>
<body>

<div class="shell pre-split" id="shell">

  <div class="seam"></div>

  <div class="half half-left">
    <div class="bg-layer">
      <svg viewBox="0 0 960 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <rect width="960" height="600" fill="#ffffff"/>
      </svg>
    </div>
  </div>

  <div class="half half-right">
    <div class="bg-layer">
      <svg viewBox="0 0 960 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="rg1" cx="75%" cy="38%" r="55%">
            <stop offset="0%" stop-color="#8b093d" stop-opacity="0.55"/>
            <stop offset="100%" stop-color="#180a0f" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="960" height="600" fill="#180a0f"/>
        <path d="M 0 0 C 80 75, 80 150, 0 225 C -80 300, -80 375, 0 450 L 0 600 L -100 600 L -100 0 Z" fill="#ffffff"/>
        <rect width="960" height="600" fill="url(#rg1)"/>
        <circle cx="680" cy="300" r="200" fill="none" stroke="rgba(210,155,155,0.05)" stroke-width="1"/>
        <circle cx="680" cy="300" r="150" fill="none" stroke="rgba(210,155,155,0.04)" stroke-width="1"/>
        <circle cx="680" cy="300" r="95"  fill="none" stroke="rgba(210,155,155,0.03)" stroke-width="1"/>
      </svg>
    </div>
  </div>

  <svg style="position:absolute;inset:0;width:100%;height:100%;z-index:1;"
       viewBox="0 0 960 600" preserveAspectRatio="xMidYMid slice"
       xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="rg1b" cx="70%" cy="38%" r="55%">
        <stop offset="0%" stop-color="#8b093d" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#180a0f" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="960" height="600" fill="#ffffff"/>
    <path d="M 510 0 C 400 100, 400 200, 510 300 C 620 400, 620 500, 510 600 L 960 600 L 960 0 Z" fill="#180a0f"/>
    <path d="M 510 0 C 400 100, 400 200, 510 300 C 620 400, 620 500, 510 600 L 960 600 L 960 0 Z" fill="#8b093d" fill-opacity="0.15"/>
    <rect x="430" width="530" height="600" fill="url(#rg1b)"/>
    <circle cx="700" cy="300" r="200" fill="none" stroke="rgba(210,155,155,0.05)" stroke-width="1"/>
    <circle cx="700" cy="300" r="150" fill="none" stroke="rgba(210,155,155,0.04)" stroke-width="1"/>
    <circle cx="700" cy="300" r="95"  fill="none" stroke="rgba(210,155,155,0.03)" stroke-width="1"/>
  </svg>

  <div class="content-layer">

    <!-- LEFT: form card -->
    <div class="left-content">
      <div class="card">

        <div class="brand-dots">
          <span></span><span></span><span></span>
        </div>

        <h2 class="card-title">Únete al <em>Jardín</em></h2>
        <p class="card-sub">Crea tu cuenta personal</p>

        <div class="orn">
          <div class="orn-line"></div>
          <div class="orn-dot"></div>
          <div class="orn-line r"></div>
        </div>

        <!-- Progress dots -->
        <div class="progress">
          <div class="pdot" id="pd0"></div>
          <div class="pdot" id="pd1"></div>
          <div class="pdot" id="pd2"></div>
          <div class="pdot" id="pd3"></div>
        </div>

        <div class="fields-grid">

          <!-- Nombre -->
          <div class="fg">
            <label>
              <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              Nombre
            </label>
            <div class="iw">
              <input type="text" id="nameInput" placeholder="Ana García" autocomplete="off">
              <svg class="fi" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
          </div>

          <!-- Usuario -->
          <div class="fg">
            <label>
              <svg viewBox="0 0 24 24"><path d="M4 17l4-4-4-4M11 19h9"/></svg>
              Usuario
            </label>
            <div class="iw">
              <input type="text" id="userInput" placeholder="@anafloral" autocomplete="off">
              <svg class="fi" viewBox="0 0 24 24"><path d="M4 17l4-4-4-4M11 19h9"/></svg>
            </div>
          </div>

          <!-- Correo -->
          <div class="fg full">
            <label>
              <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 8l10 7 10-7"/></svg>
              Correo electrónico
            </label>
            <div class="iw">
              <input type="email" id="emailInput" placeholder="tu@correo.com" autocomplete="off">
              <svg class="fi" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 8l10 7 10-7"/></svg>
            </div>
          </div>

          <!-- Contraseña -->
          <div class="fg full">
            <label>
              <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/><circle cx="12" cy="16" r="1.2" fill="rgba(168,85,85,0.7)" stroke="none"/></svg>
              Contraseña
            </label>
            <div class="iw">
              <input type="password" id="passInput" placeholder="••••••••">
              <button class="tp" id="togglePass" tabindex="-1">
                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="#a85555" stroke-width="1.6">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="err" id="errMsg"></div>

        </div>

        <button class="btn-register" id="registerBtn">Crear cuenta</button>
        <p class="reg">¿Ya tienes cuenta? <a href="#">Inicia sesión</a></p>

      </div>
    </div>

    <!-- RIGHT: flower panel -->
    <div class="right-content">
      <div class="cr cr-tr"></div>
      <div class="cr cr-br"></div>

      <div class="flower-wrap">
        <div class="flower-stage" id="flowerStage"></div>
        <div class="bloom-glow" id="bloomGlow"></div>
      </div>

      <div class="stage-label" id="stageLabel">——</div>
      <p class="r-title">Tu <em>Jardín Personal</em></p>
      <p class="r-sub">
        Cada detalle que compartes<br>hace florecer tu espacio.
      </p>
    </div>

  </div>
</div>

<script>
// ── Split reveal ──
(function() {
  var shell = document.getElementById('shell');
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      shell.classList.remove('pre-split');
      shell.classList.add('splitting');
    });
  });
})();

// ── Form ──
(function(){
  var pass   = document.getElementById('passInput');
  var btn    = document.getElementById('registerBtn');
  var errMsg = document.getElementById('errMsg');
  var toggle = document.getElementById('togglePass');
  var eye    = document.getElementById('eyeIcon');
  var vis    = false;

  toggle.addEventListener('click', function(){
    vis = !vis;
    pass.type = vis ? 'text' : 'password';
    eye.innerHTML = vis
      ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23" stroke="#a85555"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  btn.addEventListener('click', function(){
    errMsg.classList.remove('show');
    var n = document.getElementById('nameInput').value.trim();
    var u = document.getElementById('userInput').value.trim();
    var e = document.getElementById('emailInput').value.trim();
    var p = pass.value;
    if(!n || !u || !e || !p){
      errMsg.textContent = 'Completa todos los campos para continuar.';
      errMsg.classList.add('show'); return;
    }
    btn.textContent = 'Creando...';
    btn.classList.add('loading');
    setTimeout(function(){ btn.textContent = '✦ Bienvenida'; }, 1400);
  });

  ['nameInput','userInput','emailInput','passInput'].forEach(function(id){
    document.getElementById(id).addEventListener('keydown', function(e){ if(e.key==='Enter') btn.click(); });
    document.getElementById(id).addEventListener('input', function(){ errMsg.classList.remove('show'); });
  });
})();

// ── Flower animation ──

  var N = FRAMES.length; // 25

  // Distribución de frames por campo:
  // Campo 0 (nombre):   frames 0–5   (6 frames)
  // Campo 1 (usuario):  frames 6–11  (6 frames)
  // Campo 2 (correo):   frames 12–18 (7 frames)
  // Campo 3 (password): frames 19–24 (6 frames)
  var RANGES = [
    { start: 0,  end: 5  },
    { start: 6,  end: 11 },
    { start: 12, end: 18 },
    { start: 19, end: 24 }
  ];

  var LABELS = [
    'Dinos tu nombre...',
    'Elige tu usuario...',
    'Tu correo de contacto...',
    'Protege tu cuenta...'
  ];

  var stage      = document.getElementById('flowerStage');
  var glow       = document.getElementById('bloomGlow');
  var stageLabel = document.getElementById('stageLabel');
  var inputs     = [
    document.getElementById('nameInput'),
    document.getElementById('userInput'),
    document.getElementById('emailInput'),
    document.getElementById('passInput')
  ];
  var pdots = [
    document.getElementById('pd0'),
    document.getElementById('pd1'),
    document.getElementById('pd2'),
    document.getElementById('pd3')
  ];

  // Build frames
  var els = [];
  var cur = 0;
  var animTimer = null;

  for (var i = 0; i < N; i++) {
    var d = document.createElement('div');
    d.className = 'flower-frame';
    d.innerHTML = FRAMES[i];
    stage.appendChild(d);
    els.push(d);
  }
  els[0].classList.add('active');

  function updateGlow(idx) {
    var pct = idx / (N - 1);
    if      (pct > 0.75) glow.style.background = 'radial-gradient(ellipse, rgba(245,198,198,0.26) 0%, transparent 65%)';
    else if (pct > 0.5)  glow.style.background = 'radial-gradient(ellipse, rgba(245,198,198,0.18) 0%, transparent 65%)';
    else if (pct > 0.25) glow.style.background = 'radial-gradient(ellipse, rgba(245,198,198,0.10) 0%, transparent 65%)';
    else if (pct > 0.05) glow.style.background = 'radial-gradient(ellipse, rgba(245,198,198,0.05) 0%, transparent 65%)';
    else                 glow.style.background = 'radial-gradient(ellipse, rgba(245,198,198,0) 0%, transparent 65%)';
  }

  function goToFrame(target) {
    if (animTimer) { clearInterval(animTimer); animTimer = null; }
    target = Math.max(0, Math.min(N - 1, target));
    if (cur === target) return;
    var step = cur < target ? 1 : -1;
    animTimer = setInterval(function() {
      if (cur === target || cur < 0 || cur >= N) {
        clearInterval(animTimer); animTimer = null; return;
      }
      if (els[cur]) els[cur].classList.remove('active');
      cur += step;
      cur = Math.max(0, Math.min(N - 1, cur));
      if (els[cur]) els[cur].classList.add('active');
      updateGlow(cur);
    }, 55);
  }

  function getTarget() {
    // Para cada campo: si tiene contenido, muestra el último frame de su rango.
    // Si no tiene, vuelve al último frame del campo anterior activo.
    var target = 0;
    var activeField = -1;
    for (var i = 0; i < inputs.length; i++) {
      var hasContent = inputs[i].value.trim().length > 0 ||
                       (i === 3 && inputs[i].value.length > 0); // password sin trim
      if (hasContent) {
        target = RANGES[i].end;
        activeField = i;
      }
    }
    // Si ninguno tiene contenido, frame 0
    if (activeField === -1) return 0;
    return target;
  }

  function getActiveFieldIndex() {
    // Devuelve el último campo con contenido, o -1
    var last = -1;
    for (var i = 0; i < inputs.length; i++) {
      var hasContent = i < 3
        ? inputs[i].value.trim().length > 0
        : inputs[i].value.length > 0;
      if (hasContent) last = i;
    }
    return last;
  }

  function updateUI() {
    var target = getTarget();
    goToFrame(target);

    // Progress dots
    for (var i = 0; i < inputs.length; i++) {
      var hasContent = i < 3
        ? inputs[i].value.trim().length > 0
        : inputs[i].value.length > 0;
      if (hasContent) {
        pdots[i].classList.add('filled');
      } else {
        pdots[i].classList.remove('filled');
      }
    }

    // Stage label — mostrar el label del campo actualmente enfocado,
    // o del último con contenido
    var focused = document.activeElement;
    var focusedIdx = -1;
    for (var j = 0; j < inputs.length; j++) {
      if (inputs[j] === focused) { focusedIdx = j; break; }
    }
    var labelIdx = focusedIdx >= 0 ? focusedIdx : getActiveFieldIndex();

    if (labelIdx >= 0) {
      stageLabel.textContent = LABELS[labelIdx];
      stageLabel.classList.add('active');
    } else {
      stageLabel.textContent = '——';
      stageLabel.classList.remove('active');
    }
  }

  inputs.forEach(function(inp) {
    inp.addEventListener('input', updateUI);
    inp.addEventListener('focus', updateUI);
    inp.addEventListener('blur',  updateUI);
  });

})();
</script>
